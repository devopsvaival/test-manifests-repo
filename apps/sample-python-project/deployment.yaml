apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-python-project
  namespace: python-deploy
  labels:
    app: sample-python-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-python-project
  template:
    metadata:
      labels:
        app: sample-python-project
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: app
        image: ghcr.io/devopsvaival/sample-python-project:4
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: production
        - name: PYTHONUNBUFFERED
          value: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
