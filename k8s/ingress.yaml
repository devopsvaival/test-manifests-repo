# PR target: devopsvaival/test-manifests-repo  →  k8s/ingress.yaml
# After Step 8 flips ArgoCD/Grafana to prod issuer, this app Ingress also targets letsencrypt-prod.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-python-project
  namespace: test-app-claude
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - test-app-claude.rundev.us
      secretName: test-app-claude-tls
  rules:
    - host: test-app-claude.rundev.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-python-project
                port:
                  number: 80
